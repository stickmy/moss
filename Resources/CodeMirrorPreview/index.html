<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <style>
      :root {
        --moss-scrollbar-thumb: rgba(255, 255, 255, 0.16);
        --moss-scrollbar-thumb-hover: rgba(255, 255, 255, 0.24);
        --moss-scrollbar-thumb-active: rgba(255, 255, 255, 0.32);
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: transparent;
      }

      #app .cm-scroller {
        scrollbar-width: thin;
        scrollbar-color: var(--moss-scrollbar-thumb) transparent;
      }

      #app .cm-scroller::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }

      #app .cm-scroller::-webkit-scrollbar-track,
      #app .cm-scroller::-webkit-scrollbar-corner {
        background: transparent;
      }

      #app .cm-scroller::-webkit-scrollbar-thumb {
        background: var(--moss-scrollbar-thumb);
        border-radius: 0;
      }

      #app .cm-scroller:hover::-webkit-scrollbar-thumb {
        background: var(--moss-scrollbar-thumb-hover);
      }

      #app .cm-scroller::-webkit-scrollbar-thumb:active {
        background: var(--moss-scrollbar-thumb-active);
      }
    </style>
    <script>
      (function () {
        function report(payload) {
          try {
            window.webkit?.messageHandlers?.mossPreview?.postMessage(payload);
          } catch {}
        }

        window.addEventListener("error", function (event) {
          report({
            type: "error",
            message: "CodeMirror bootstrap error: " + event.message,
          });
        });

        window.addEventListener("unhandledrejection", function (event) {
          report({
            type: "error",
            message: "CodeMirror bootstrap rejection: " + String(event.reason),
          });
        });

        report({
          type: "debug",
          message: "Bootstrap guard installed. readyState=" + document.readyState,
        });
      })();
    </script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
